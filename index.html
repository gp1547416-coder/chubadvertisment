<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWiki | The Digital Manual</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const articles = [
            { id: 1, title: "How to Understand Google", icon: "search", content: "Google started as PageRank at Stanford and grew into Alphabet, a global AI and search powerhouse." },
            { id: 2, title: "How Apple Redefined Hardware", icon: "smartphone", content: "From the Macintosh to the iPhone, Apple focuses on vertical integration and premium user experience." },
            { id: 3, title: "The Rise of Tesla & EVs", icon: "zap", content: "Tesla shifted the global automotive industry toward sustainable energy and software-defined vehicles." },
            { id: 4, title: "How Semiconductors Work", icon: "cpu", content: "Silicon chips are the brain of the modern world, etched with billions of transistors via lithography." },
            { id: 5, title: "Understanding Cloud Computing", icon: "cloud", content: "AWS, Azure, and Google Cloud allow businesses to rent supercomputing power over the internet." },
            { id: 6, title: "How Blockchain Secures Data", icon: "shield", content: "A decentralized ledger that ensures transparency and security without a central authority." },
            { id: 7, title: "The Future of Quantum Computing", icon: "atom", content: "Using subatomic particles to solve calculations that would take millions of years for a standard PC." },
            { id: 8, title: "How SpaceX Reaches Mars", icon: "rocket", content: "Reusable rocketry is lowering the cost of space travel and making humanity a multi-planetary species." },
            { id: 9, title: "Understanding Generative AI", icon: "bot", content: "Large Language Models like Gemini and GPT-4 use neural networks to predict and create human-like text." },
            { id: 10, title: "How 5G Changes Connectivity", icon: "antenna", content: "Ultra-low latency and massive bandwidth enable the Internet of Things (IoT) at a global scale." },
            // ... (Imagine 30 more topics added here to fill the list)
            { id: 11, title: "The Metaverse Explained", icon: "glasses", content: "Blending VR and AR to create a persistent 3D digital space for work and play." },
            { id: 12, title: "How Cybersecurity Protects You", icon: "lock", content: "Encryption and firewalls form the front line against global digital threats." },
            { id: 13, title: "The Evolution of Video Games", icon: "gamepad-2", content: "From Pong to ray-traced open worlds, gaming pushes the limits of consumer hardware." },
            { id: 14, title: "How Social Algorithms Work", icon: "users", content: "Engagement-based ranking determines what you see on TikTok, Instagram, and X." },
            { id: 15, title: "Understanding Open Source", icon: "code-2", content: "How Linux and GitHub allow the world to build software together for free." }
        ];

        // Fill up to 40 for the UI demo
        const fullArticles = [...articles];
        for (let i = 16; i <= 40; i++) {
            fullArticles.push({ id: i, title: `Article #${i}: Tech Deep Dive`, icon: "file-text", content: "Detailed technical analysis of modern digital infrastructure and its societal impact." });
        }

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [activeArticle, setActiveArticle] = useState(fullArticles[0]);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setLoading(false);
                    lucide.createIcons();
                }, 1500);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeArticle]);

            if (loading) {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center bg-white z-[100]">
                        <div className="w-12 h-12 border-4 border-emerald-100 border-t-emerald-600 rounded-full animate-spin"></div>
                        <h1 className="mt-4 text-3xl font-black text-emerald-600 italic tracking-tighter italic">TechWiki</h1>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <nav className="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <span className="text-2xl font-black text-emerald-600 italic tracking-tighter">TechWiki</span>
                        </div>
                        <div className="hidden md:block text-slate-400 text-sm font-medium italic">"Knowledge for the Next Billion Users"</div>
                        <i data-lucide="menu" className="text-slate-600 cursor-pointer"></i>
                    </nav>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar - Perfect for iPad scrolling */}
                        <aside className="hidden lg:block w-80 bg-white border-r overflow-y-auto custom-scrollbar">
                            <div className="p-4 font-bold text-xs uppercase tracking-widest text-slate-400 border-b">40 Tech Articles</div>
                            {fullArticles.map(art => (
                                <button 
                                    key={art.id}
                                    onClick={() => setActiveArticle(art)}
                                    className={`w-full text-left p-4 hover:bg-emerald-50 border-b transition-colors flex items-center gap-3 ${activeArticle.id === art.id ? 'bg-emerald-50 border-r-4 border-r-emerald-600' : ''}`}
                                >
                                    <i data-lucide={art.icon} className={`w-4 h-4 ${activeArticle.id === art.id ? 'text-emerald-600' : 'text-slate-400'}`}></i>
                                    <span className={`text-sm font-semibold ${activeArticle.id === art.id ? 'text-emerald-700' : 'text-slate-600'}`}>{art.title}</span>
                                </button>
                            ))}
                        </aside>

                        {/* Article Content */}
                        <main className="flex-1 overflow-y-auto p-6 md:p-12">
                            <div className="max-w-3xl mx-auto bg-white rounded-2xl border shadow-sm p-8 md:p-16">
                                <div className="flex items-center gap-2 text-emerald-700 text-[10px] font-bold uppercase tracking-widest mb-6">
                                    <i data-lucide="book-open" className="w-4 h-4"></i>
                                    TechWiki Expert Verified
                                </div>
                                <h1 className="text-4xl md:text-6xl font-black text-slate-900 leading-none mb-8">
                                    {activeArticle.title}
                                </h1>
                                <div className="aspect-video bg-slate-100 rounded-3xl mb-10 flex flex-col items-center justify-center text-emerald-600 border-2 border-dashed border-emerald-200">
                                    <i data-lucide={activeArticle.icon} className="w-20 h-20 mb-4 opacity-20"></i>
                                    <span className="font-mono text-xs uppercase tracking-widest opacity-50">Visualizing Technology...</span>
                                </div>
                                <p className="text-xl text-slate-600 leading-relaxed mb-8 first-letter:text-5xl first-letter:font-bold first-letter:text-emerald-600 first-letter:mr-2 first-letter:float-left">
                                    {activeArticle.content} This article explores the intricate details of how {activeArticle.title.replace("How to ", "")} impacts the global economy and individual users. As we move further into 2026, the convergence of hardware efficiency and AI software continues to redefine the boundaries of what is possible.
                                </p>
                                <div className="bg-emerald-50 border-l-4 border-emerald-500 p-6 rounded-r-xl">
                                    <h4 className="font-bold text-emerald-800 flex items-center gap-2 mb-2">
                                        <i data-lucide="lightbulb" className="w-5 h-5"></i> TechWiki Quick Tip
                                    </h4>
                                    <p className="text-emerald-700 text-sm italic">Always check for the latest firmware updates and security patches to ensure your digital tools remain safe and efficient in this rapidly evolving landscape.</p>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
